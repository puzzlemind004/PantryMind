# Environnement de développement — fournit uniquement les services d'infrastructure.
# L'API et le front tournent en local (voir README).
name: cooking

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cooking
      POSTGRES_PASSWORD: cooking
      POSTGRES_DB: cooking
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cooking -d cooking']
      interval: 5s
      timeout: 3s
      retries: 10

  # Base dédiée aux tests fonctionnels de l'API (jetable, sans volume)
  postgres_test:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cooking
      POSTGRES_PASSWORD: cooking
      POSTGRES_DB: cooking_test
    ports:
      - '5433:5432'

volumes:
  postgres_data:
