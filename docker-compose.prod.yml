# Production — VPS Ubuntu.
# Usage :
#   cp .env.production.example .env.production   # puis renseigner les valeurs
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Les variables d'interpolation sont préfixées COOKING_ : les variables du
# shell ont priorité sur --env-file dans Docker Compose, et le serveur peut
# exporter des DB_USER/APP_KEY appartenant à d'autres applications. Le
# préfixe rend toute collision impossible.
name: cooking-prod

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${COOKING_DB_USER}
      POSTGRES_PASSWORD: ${COOKING_DB_PASSWORD}
      POSTGRES_DB: ${COOKING_DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${COOKING_DB_USER} -d ${COOKING_DB_DATABASE}']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: UTC
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_KEY: ${COOKING_APP_KEY}
      APP_URL: ${COOKING_APP_URL}
      SESSION_DRIVER: cookie
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${COOKING_DB_USER}
      DB_PASSWORD: ${COOKING_DB_PASSWORD}
      DB_DATABASE: ${COOKING_DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${COOKING_SITE_ADDRESS}
    # Mode autonome (défaut) : Caddy prend 80/443 et gère le TLS.
    # Derrière un reverse proxy natif existant (nginx…) : lier en local,
    # ex. COOKING_WEB_BIND=127.0.0.1:8080 et COOKING_WEB_TLS_BIND=127.0.0.1:8443,
    # avec COOKING_SITE_ADDRESS=:80 (voir docs/deployment.md §« Cohabitation »).
    ports:
      - '${COOKING_WEB_BIND:-80}:80'
      - '${COOKING_WEB_TLS_BIND:-443}:443'
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
